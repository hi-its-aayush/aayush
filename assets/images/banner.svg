<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">
<style>
  .bg { fill: #0a0a0a; }
  .name { font: bold 44px 'Courier New', monospace; fill: #ededed; }
  .role { font: 400 17px 'Courier New', monospace; fill: #a1a1aa; }
  .url  { font: 400 11px 'Courier New', monospace; fill: #3b82f6; opacity: 0.55; }
  .badge-bg   { fill: #0f1f3d; }
  .badge-text { font: 500 12px 'Courier New', monospace; fill: #60a5fa; }
  .cursor { fill: #3b82f6; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .c1 { animation: blink 0.75s step-end infinite; animation-delay: 1.9s; opacity: 0; }
  .c2 { animation: blink 0.75s step-end infinite; animation-delay: 3.2s; opacity: 0; }
  @keyframes dash { to { stroke-dashoffset: -20; } }
  .lflow { fill:none; stroke:#3b82f6; stroke-width:0.9; stroke-dasharray:5 4; opacity:0.3; animation:dash 2.4s linear infinite; }
  .lfade { fill:none; stroke:#3b82f6; stroke-width:0.6; opacity:0.15; }
  @keyframes fp { 0%,100%{opacity:0.15} 50%{opacity:0.5} }
  .sp { fill:#3b82f6; }
  .p1 { animation: fp 3.1s ease-in-out infinite; }
  .p2 { animation: fp 3.1s ease-in-out infinite; animation-delay:0.6s; }
  .p3 { animation: fp 3.1s ease-in-out infinite; animation-delay:1.2s; }
  .p4 { animation: fp 3.1s ease-in-out infinite; animation-delay:1.8s; }
  .p5 { animation: fp 3.1s ease-in-out infinite; animation-delay:2.4s; }
  .p6 { animation: fp 3.1s ease-in-out infinite; animation-delay:0.3s; }
  .p7 { animation: fp 3.1s ease-in-out infinite; animation-delay:0.9s; }
</style>
<defs>
  <clipPath id="cn">
    <rect x="40" y="62" height="62" width="0">
      <animate attributeName="width" from="0" to="435" dur="1.4s" begin="0.3s" fill="freeze"/>
    </rect>
  </clipPath>
  <clipPath id="cr">
    <rect x="40" y="130" height="36" width="0">
      <animate attributeName="width" from="0" to="370" dur="1.1s" begin="2.0s" fill="freeze"/>
    </rect>
  </clipPath>
  <clipPath id="cbg">
    <rect x="40" y="182" height="38" width="0">
      <animate attributeName="width" from="0" to="200" dur="0.35s" begin="3.2s" fill="freeze"/>
    </rect>
  </clipPath>
</defs>
<rect class="bg" width="900" height="260" rx="14"/>
<g stroke="#3b82f6" stroke-width="0.4" opacity="0.035">
  <line x1="120" y1="0" x2="120" y2="260"/><line x1="240" y1="0" x2="240" y2="260"/>
  <line x1="360" y1="0" x2="360" y2="260"/><line x1="480" y1="0" x2="480" y2="260"/>
  <line x1="0" y1="65" x2="900" y2="65"/><line x1="0" y1="130" x2="900" y2="130"/>
  <line x1="0" y1="195" x2="900" y2="195"/>
</g>
<rect width="898" height="258" x="1" y="1" rx="13.5" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.25"/>
<text x="40" y="114" class="name" clip-path="url(#cn)">Aayush Acharya</text>
<rect class="cursor c1" x="472" y="72" width="3" height="48">
  <animate attributeName="x" from="40" to="472" dur="1.4s" begin="0.3s" fill="freeze"/>
  <animate attributeName="opacity" from="0" to="1" dur="0.01s" begin="0.3s" fill="freeze"/>
</rect>
<text x="40" y="158" class="role" clip-path="url(#cr)">AV &amp; Technical Support Analyst</text>
<rect class="cursor c2" x="402" y="136" width="2" height="26">
  <animate attributeName="x" from="40" to="402" dur="1.1s" begin="2.0s" fill="freeze"/>
  <animate attributeName="opacity" from="0" to="1" dur="0.01s" begin="2.0s" fill="freeze"/>
</rect>
<g clip-path="url(#cbg)">
  <rect x="40" y="192" width="186" height="26" rx="13" class="badge-bg"/>
  <circle cx="59" cy="205" r="3.5" fill="#3b82f6" opacity="0.9"/>
  <text x="71" y="210" class="badge-text">PwC Sydney  ·  NSW</text>
</g>
<g class="lfade">
  <line x1="590" y1="210" x2="640" y2="160"/><line x1="860" y1="50" x2="820" y2="100"/>
  <line x1="875" y1="210" x2="840" y2="175"/>
</g>
<g class="lflow">
  <line x1="640" y1="80" x2="720" y2="115"/><line x1="720" y1="115" x2="800" y2="78"/>
  <line x1="720" y1="115" x2="695" y2="185"/><line x1="800" y1="78" x2="840" y2="158"/>
  <line x1="840" y1="158" x2="770" y2="205"/><line x1="770" y1="205" x2="695" y2="185"/>
  <line x1="695" y1="185" x2="720" y2="115"/><line x1="640" y1="80" x2="695" y2="185"/>
  <line x1="800" y1="78" x2="770" y2="205"/><line x1="870" y1="118" x2="840" y2="158"/>
  <line x1="870" y1="118" x2="800" y2="78"/><line x1="610" y1="168" x2="640" y2="80"/>
  <line x1="610" y1="168" x2="695" y2="185"/>
</g>
<circle cx="720" cy="115" r="5" fill="none" stroke="#3b82f6" stroke-width="2">
  <animate attributeName="r" from="8" to="32" dur="3s" repeatCount="indefinite"/>
  <animate attributeName="opacity" from="0.5" to="0" dur="3s" repeatCount="indefinite"/>
  <animate attributeName="stroke-width" from="2" to="0.3" dur="3s" repeatCount="indefinite"/>
</circle>
<circle class="sp p1" cx="720" cy="115" r="6"/>
<circle class="sp p2" cx="640" cy="80" r="5"/>
<circle class="sp p3" cx="800" cy="78" r="5"/>
<circle class="sp p4" cx="695" cy="185" r="5"/>
<circle class="sp p5" cx="770" cy="205" r="4.5" opacity="0.75"/>
<circle class="sp p6" cx="840" cy="158" r="5"/>
<circle class="sp p7" cx="870" cy="118" r="4" opacity="0.65"/>
<circle class="sp p1" cx="610" cy="168" r="3.5" opacity="0.6"/>
<circle class="sp p3" cx="850" cy="200" r="3" opacity="0.45"/>
<circle class="sp p2" cx="660" cy="220" r="2.5" opacity="0.4"/>
<text x="740" y="245" class="url" text-anchor="middle">aayushacharya.com.au</text>
</svg>
