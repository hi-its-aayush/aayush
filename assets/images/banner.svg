<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 200" width="1400" height="200">
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="0.8" fill="#1e1e1e"/>
    </pattern>
  </defs>

  <!-- Base -->
  <rect width="1400" height="200" fill="#0d1117"/>
  <rect width="1400" height="200" fill="url(#dots)"/>

  <!-- Left accent -->
  <rect x="0" y="0" width="4" height="200" fill="#3b82f6"/>

  <!-- Bottom border -->
  <line x1="0" y1="199" x2="1400" y2="199" stroke="#30363d" stroke-width="1"/>

  <!-- Terminal window card -->
  <rect x="32" y="20" width="780" height="160" rx="8" fill="#0a0a0a" stroke="#30363d" stroke-width="1"/>

  <!-- Terminal title bar -->
  <rect x="32" y="20" width="780" height="36" rx="8" fill="#161b22"/>
  <rect x="32" y="44" width="780" height="12" fill="#161b22"/>

  <!-- Traffic lights -->
  <circle cx="54"  cy="38" r="5" fill="#ff5f56"/>
  <circle cx="72"  cy="38" r="5" fill="#ffbd2e"/>
  <circle cx="90"  cy="38" r="5" fill="#27c93f"/>

  <!-- Terminal title -->
  <text x="430" y="43" font-family="'Courier New', Courier, monospace" font-size="12" fill="#6e7681" text-anchor="middle">bash — aayush@hub</text>

  <!-- Terminal line 1 -->
  <text x="56" y="84" font-family="'Courier New', Courier, monospace" font-size="13">
    <tspan fill="#27c93f">aayush@hub</tspan><tspan fill="#6e7681">:</tspan><tspan fill="#3b82f6">~</tspan><tspan fill="#d4d4d4">$ </tspan><tspan fill="#d4d4d4">whoami</tspan>
  </text>

  <!-- Output line 1 -->
  <text x="56" y="107" font-family="'Courier New', Courier, monospace" font-size="13" fill="#a1a1aa">Aayush Acharya — IT Support Officer | Sydney, AU</text>

  <!-- Terminal line 2 -->
  <text x="56" y="130" font-family="'Courier New', Courier, monospace" font-size="13">
    <tspan fill="#27c93f">aayush@hub</tspan><tspan fill="#6e7681">:</tspan><tspan fill="#3b82f6">~</tspan><tspan fill="#d4d4d4">$ </tspan><tspan fill="#d4d4d4">cat goals.txt</tspan>
  </text>

  <!-- Output line 2 -->
  <text x="56" y="153" font-family="'Courier New', Courier, monospace" font-size="13" fill="#a1a1aa">IT Support <tspan fill="#3b82f6">→</tspan> DevOps <tspan fill="#3b82f6">→</tspan> Full-Stack Engineer</text>

  <!-- Cursor -->
  <text x="56" y="173" font-family="'Courier New', Courier, monospace" font-size="13">
    <tspan fill="#27c93f">aayush@hub</tspan><tspan fill="#6e7681">:</tspan><tspan fill="#3b82f6">~</tspan><tspan fill="#d4d4d4">$ </tspan>
  </text>
  <rect x="147" y="161" width="9" height="14" fill="#3b82f6" opacity="0.9"/>

  <!-- Right decorative: radar -->
  <circle cx="1200" cy="100" r="180" fill="none" stroke="#161b22" stroke-width="1"/>
  <circle cx="1200" cy="100" r="130" fill="none" stroke="#1a1f2a" stroke-width="1"/>
  <circle cx="1200" cy="100" r="85"  fill="none" stroke="#1e2535" stroke-width="1"/>
  <circle cx="1200" cy="100" r="45"  fill="none" stroke="#222b3d" stroke-width="1"/>

  <line x1="1200" y1="0"   x2="1200" y2="200" stroke="#1a2a3e" stroke-width="0.8"/>
  <line x1="1000" y1="100" x2="1400" y2="100" stroke="#1a2a3e" stroke-width="0.8"/>

  <circle cx="1200" cy="100" r="5"  fill="#3b82f6"/>
  <circle cx="1200" cy="100" r="11" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>

  <circle cx="1200" cy="20"  r="2.5" fill="#3b82f6" opacity="0.5"/>
  <circle cx="1200" cy="180" r="2.5" fill="#3b82f6" opacity="0.5"/>
  <circle cx="1115" cy="100" r="2.5" fill="#3b82f6" opacity="0.5"/>
  <circle cx="1285" cy="100" r="2.5" fill="#3b82f6" opacity="0.5"/>

  <line x1="1200" y1="20"  x2="1285" y2="100" stroke="#3b82f6" stroke-width="0.6" opacity="0.3"/>
  <line x1="1200" y1="180" x2="1115" y2="100" stroke="#3b82f6" stroke-width="0.6" opacity="0.3"/>

  <circle cx="1340" cy="45"  r="2" fill="#3b82f6" opacity="0.3"/>
  <circle cx="1380" cy="150" r="2" fill="#3b82f6" opacity="0.3"/>
  <circle cx="1060" cy="60"  r="2" fill="#3b82f6" opacity="0.3"/>
  <circle cx="1090" cy="160" r="2" fill="#3b82f6" opacity="0.3"/>
  <line x1="1340" y1="45"  x2="1380" y2="150" stroke="#3b82f6" stroke-width="0.4" opacity="0.15"/>
  <line x1="1060" y1="60"  x2="1090" y2="160" stroke="#3b82f6" stroke-width="0.4" opacity="0.15"/>
</svg>
